name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN repository secret."
            exit 1
          fi
          if [ -z "$HF_SPACE" ]; then
            echo "Missing HF_SPACE repository variable, for example: username/space-name"
            exit 1
          fi
          git remote add huggingface "https://hf:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force huggingface HEAD:main
